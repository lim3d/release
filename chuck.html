<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>척준경 49재 카운터</title>
    
    <!-- 카카오톡/SNS 공유 미리보기 세팅 (Open Graph) -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://lim3d.github.io/release/chuck.html">
    <meta property="og:title" content="척준경 49재">
    <meta property="og:description" content="2026년 3월 16일부터 시작된 49일간의 여정">
    <meta property="og:image" content="https://images.unsplash.com/photo-1505673539012-e485c9ff2293?auto=format&fit=crop&q=80&w=500">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Serif KR', serif;
            background-color: #2a2a2a;
            background-image: linear-gradient(135deg, #333333 0%, #252525 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            color: #ffffff;
            overflow-x: hidden;
        }
        .altar-card {
            background: #151515;
            border: 1px solid #441111;
            border-top: 5px solid #ff3333;
            border-radius: 1rem;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
            padding: 3rem 2rem;
            width: 95%;
            max-width: 500px;
            text-align: center;
            position: relative;
            z-index: 10;
        }
        .counter-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.75rem;
            margin-top: 2rem;
        }
        .time-box {
            background: #222222;
            padding: 1.25rem 0.5rem;
            border: 1px solid #3a3a3a;
            border-radius: 0.5rem;
        }
        .time-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: #ff3333;
            display: block;
            text-shadow: 0 0 12px rgba(255, 51, 51, 0.4);
        }
        .time-label {
            font-size: 0.7rem;
            color: #888;
            margin-top: 0.25rem;
        }
        .progress-container {
            width: 100%;
            height: 6px;
            background: #333333;
            border-radius: 3px;
            margin: 2rem 0 1rem 0;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #cc0000, #ff3333);
            width: 0%;
            transition: width 1s ease-out;
        }
        .flower-btn {
            background: linear-gradient(180deg, #222, #111);
            border: 1px solid #444;
            color: #ccc;
            padding: 1rem 2rem;
            border-radius: 9999px;
            margin-top: 2.5rem;
            transition: all 0.3s ease;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
        }
        .flower-btn:hover {
            border-color: #ff3333;
            color: #ff3333;
            transform: translateY(-2px);
        }
        .flower-btn:active {
            transform: translateY(0);
        }
        .flower-particle {
            position: fixed;
            pointer-events: none;
            z-index: 100;
            animation: fall linear forwards;
        }
        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

<div class="altar-card">
    <div class="mb-4">
        <span class="text-[10px] border border-red-600/30 px-3 py-1 text-red-500 tracking-[0.4em] uppercase font-bold bg-red-950/20">
            In Remembrance
        </span>
    </div>
    
    <h1 class="text-3xl font-bold mb-2 text-[#ff3333] tracking-widest">척준경 49재</h1>
    <p class="text-zinc-500 text-[10px] mb-8 tracking-widest">
        발인: 2026년 3월 16일 21:53
    </p>

    <div class="text-6xl font-black mb-4 text-white" id="dday-text">D-00</div>

    <div class="progress-container">
        <div class="progress-bar" id="progress-bar"></div>
    </div>
    <div class="flex justify-between text-[9px] text-zinc-600 font-bold px-1 tracking-widest">
        <span>START</span>
        <span id="progress-percent">0%</span>
        <span>49TH DAY</span>
    </div>

    <div class="counter-grid">
        <div class="time-box">
            <span class="time-value" id="days">00</span>
            <span class="time-label">일</span>
        </div>
        <div class="time-box">
            <span class="time-value" id="hours">00</span>
            <span class="time-label">시간</span>
        </div>
        <div class="time-box">
            <span class="time-value" id="minutes">00</span>
            <span class="time-label">분</span>
        </div>
        <div class="time-box">
            <span class="time-value" id="seconds">00</span>
            <span class="time-label">초</span>
        </div>
    </div>

    <!-- 헌화하기 기능 추가 -->
    <button class="flower-btn" onclick="offerFlower()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12,22C12,22 13,18 15,15C17,12 21,11 21,11C21,11 17,10 15,7C13,4 12,0 12,0C12,0 11,4 9,7C7,10 3,11 3,11C3,11 7,12 9,15C11,18 12,22 12,22Z"/>
        </svg>
        <span class="font-bold tracking-widest">헌화하기</span>
    </button>
    <div class="text-[10px] text-zinc-600 mt-2">현재까지 헌화 수: <span id="flower-count">0</span>송이</div>

    <div class="mt-10 pt-6 border-t border-zinc-800 text-[9px] text-zinc-600 tracking-widest font-sans">
        SYSTEM TIME: <span id="current-time-display">-</span>
    </div>
</div>

<script>
    const startDate = new Date('2026-03-16T21:53:00');
    const targetDate = new Date(startDate.getTime() + (49 * 24 * 60 * 60 * 1000));
    const totalDuration = targetDate - startDate;

    function updateTimer() {
        const now = new Date();
        const diff = targetDate - now;

        const formatOptions = { 
            year: 'numeric', month: '2-digit', day: '2-digit', 
            hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false 
        };
        document.getElementById('current-time-display').innerText = now.toLocaleString('ko-KR', formatOptions);

        if (diff <= 0) {
            document.getElementById('dday-text').innerText = "D-DAY";
            document.getElementById('dday-text').style.color = "#ff3333";
            document.getElementById('progress-bar').style.width = "100%";
            document.getElementById('progress-percent').innerText = "100%";
            return;
        }

        const d = Math.floor(diff / (1000 * 60 * 60 * 24));
        const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        const s = Math.floor((diff % (1000 * 60)) / 1000);

        document.getElementById('dday-text').innerText = `D-${d}`;
        document.getElementById('days').innerText = d.toString().padStart(2, '0');
        document.getElementById('hours').innerText = h.toString().padStart(2, '0');
        document.getElementById('minutes').innerText = m.toString().padStart(2, '0');
        document.getElementById('seconds').innerText = s.toString().padStart(2, '0');

        const elapsed = now - startDate;
        let progress = (elapsed / totalDuration) * 100;
        progress = Math.min(Math.max(progress, 0), 100);
        
        document.getElementById('progress-bar').style.width = `${progress}%`;
        document.getElementById('progress-percent').innerText = `${Math.floor(progress)}%`;
    }

    // 헌화 기능 로직
    let flowers = parseInt(localStorage.getItem('flowerCount_chuck') || '0');
    document.getElementById('flower-count').innerText = flowers;

    function offerFlower() {
        flowers++;
        localStorage.setItem('flowerCount_chuck', flowers);
        document.getElementById('flower-count').innerText = flowers;

        // 꽃잎 흩날리는 효과
        for(let i=0; i<15; i++) {
            createFlower();
        }
    }

    function createFlower() {
        const flower = document.createElement('div');
        flower.className = 'flower-particle';
        
        // 국화꽃 모양 SVG
        flower.innerHTML = `
            <svg width="20" height="20" viewBox="0 0 24 24" fill="white" style="opacity: ${Math.random() * 0.7 + 0.3}">
                <path d="M12,2L13.5,8.5L20,10L13.5,11.5L12,18L10.5,11.5L4,10L10.5,8.5L12,2Z" />
            </svg>
        `;
        
        const startX = Math.random() * window.innerWidth;
        const duration = Math.random() * 3 + 2;
        const size = Math.random() * 15 + 10;
        
        flower.style.left = startX + 'px';
        flower.style.top = '-20px';
        flower.style.width = size + 'px';
        flower.style.animationDuration = duration + 's';
        
        document.body.appendChild(flower);
        
        setTimeout(() => {
            flower.remove();
        }, duration * 1000);
    }

    updateTimer();
    setInterval(updateTimer, 1000);
</script>

</body>
</html>
