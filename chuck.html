<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>척준경 49재 카운터</title>
    
    <!-- 카카오톡/SNS 공유 미리보기 세팅 (Open Graph) -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://lim3d.github.io/release/chuck.html">
    <meta property="og:title" content="척준경 49재">
    <meta property="og:description" content="2026년 3월 16일부터 시작된 49일간의 여정">
    <meta property="og:image" content="https://images.unsplash.com/photo-1505673539012-e485c9ff2293?auto=format&fit=crop&q=80&w=500"> <!-- 미리보기 이미지 (원하는 이미지 주소로 변경 가능) -->

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Serif KR', serif;
            background-color: #2a2a2a;
            background-image: linear-gradient(135deg, #333333 0%, #252525 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            color: #ffffff;
        }
        .altar-card {
            background: #151515;
            border: 1px solid #441111;
            border-top: 5px solid #ff3333;
            border-radius: 1rem;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
            padding: 3.5rem 2.5rem;
            width: 95%;
            max-width: 550px;
            text-align: center;
        }
        .counter-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.75rem;
            margin-top: 2.5rem;
        }
        .time-box {
            background: #222222;
            padding: 1.25rem 0.5rem;
            border: 1px solid #3a3a3a;
            border-radius: 0.5rem;
            transition: all 0.3s ease;
        }
        .time-box:hover {
            border-color: #ff3333;
            background: #2d2d2d;
        }
        .time-value {
            font-size: 1.75rem;
            font-weight: 700;
            color: #ff3333;
            display: block;
            text-shadow: 0 0 12px rgba(255, 51, 51, 0.4);
        }
        .time-label {
            font-size: 0.75rem;
            color: #bbbbbb;
            margin-top: 0.25rem;
        }
        .progress-container {
            width: 100%;
            height: 8px;
            background: #333333;
            border-radius: 4px;
            margin: 2.5rem 0 1rem 0;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #cc0000, #ff3333);
            width: 0%;
            box-shadow: 0 0 15px rgba(255, 51, 51, 0.5);
            transition: width 1s ease-out;
        }
        .title-accent {
            color: #ff3333;
            letter-spacing: 0.15em;
            font-weight: 900;
            text-shadow: 0 4px 8px rgba(0, 0, 0, 0.8);
        }
        #dday-text {
            color: #ffffff;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>

<div class="altar-card">
    <div class="mb-6">
        <span class="text-[11px] border border-red-600/30 px-4 py-1.5 text-red-500 tracking-[0.4em] uppercase font-bold bg-red-950/20">
            In Remembrance
        </span>
    </div>
    
    <h1 class="text-4xl font-bold mb-3 title-accent">척준경 49재</h1>
    <p class="text-zinc-400 text-xs mb-10 tracking-widest font-medium">
        발인: 2026년 3월 16일 21:53
    </p>

    <div class="text-7xl font-black mb-4" id="dday-text">
        D-00
    </div>

    <div class="progress-container">
        <div class="progress-bar" id="progress-bar"></div>
    </div>
    <div class="flex justify-between text-[10px] text-zinc-500 font-bold px-1 tracking-widest">
        <span>START</span>
        <span id="progress-percent" class="text-zinc-300">0%</span>
        <span>49TH DAY</span>
    </div>

    <div class="counter-grid">
        <div class="time-box">
            <span class="time-value" id="days">00</span>
            <span class="time-label">일</span>
        </div>
        <div class="time-box">
            <span class="time-value" id="hours">00</span>
            <span class="time-label">시간</span>
        </div>
        <div class="time-box">
            <span class="time-value" id="minutes">00</span>
            <span class="time-label">분</span>
        </div>
        <div class="time-box">
            <span class="time-value" id="seconds">00</span>
            <span class="time-label">초</span>
        </div>
    </div>

    <div class="mt-12 pt-6 border-t border-zinc-800 text-[10px] text-zinc-500 tracking-widest font-sans">
        SYSTEM TIME: <span id="current-time-display" class="text-zinc-400">-</span>
    </div>
</div>

<script>
    const startDate = new Date('2026-03-16T21:53:00');
    const targetDate = new Date(startDate.getTime() + (49 * 24 * 60 * 60 * 1000));
    const totalDuration = targetDate - startDate;

    function updateTimer() {
        const now = new Date();
        const diff = targetDate - now;

        const formatOptions = { 
            year: 'numeric', month: '2-digit', day: '2-digit', 
            hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false 
        };
        document.getElementById('current-time-display').innerText = now.toLocaleString('ko-KR', formatOptions);

        if (diff <= 0) {
            document.getElementById('dday-text').innerText = "D-DAY";
            document.getElementById('dday-text').style.color = "#ff3333";
            document.getElementById('days').innerText = "00";
            document.getElementById('hours').innerText = "00";
            document.getElementById('minutes').innerText = "00";
            document.getElementById('seconds').innerText = "00";
            document.getElementById('progress-bar').style.width = "100%";
            document.getElementById('progress-percent').innerText = "100%";
            return;
        }

        const d = Math.floor(diff / (1000 * 60 * 60 * 24));
        const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        const s = Math.floor((diff % (1000 * 60)) / 1000);

        document.getElementById('dday-text').innerText = `D-${d}`;
        document.getElementById('days').innerText = d.toString().padStart(2, '0');
        document.getElementById('hours').innerText = h.toString().padStart(2, '0');
        document.getElementById('minutes').innerText = m.toString().padStart(2, '0');
        document.getElementById('seconds').innerText = s.toString().padStart(2, '0');

        const elapsed = now - startDate;
        let progress = (elapsed / totalDuration) * 100;
        progress = Math.min(Math.max(progress, 0), 100);
        
        document.getElementById('progress-bar').style.width = `${progress}%`;
        document.getElementById('progress-percent').innerText = `${Math.floor(progress)}%`;
    }

    updateTimer();
    setInterval(updateTimer, 1000);
</script>

</body>
</html>
